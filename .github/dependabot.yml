version: 2
updates:
  # E8916: github-actions entry required
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies

  # npm updates - weekly to stay within safe update frequency
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-patch
