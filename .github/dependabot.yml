version: 2
updates:
  # E8916: github-actions entry required
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default: 7
    labels:
      - dependencies

  # npm with cooldown >= 7 days (E8915)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default: 7
    labels:
      - dependencies
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-patch
